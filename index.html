<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Wedstrijdschema & Taken</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-emerald-700 tracking-tight">🏑 Hockey Taken Planner</h1>
                <p id="appSubtitle" class="text-slate-500 mt-1">Laden...</p>
            </div>
            <div id="modeBadge" class="text-xs font-bold px-3 py-1 rounded-full shadow-xs"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div id="adminPanel" class="space-y-6 hidden">
                
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-1 text-slate-700 flex items-center gap-2">🏃‍♂️ Team & Statistieken</h2>
                    <p class="text-xs text-slate-400 mb-3">📊 = Aantal taken | 🚫 = Aantal keer afgemeld.</p>
                    <form id="rosterForm" class="flex gap-2 mb-4">
                        <input type="text" id="playerName" placeholder="Naam speler..." required class="flex-1 px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition">Toevoegen</button>
                    </form>
                    <div id="rosterList" class="space-y-1.5 max-h-48 overflow-y-auto pr-1">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 id="formTitle" class="text-xl font-bold mb-4 text-slate-700">Nieuwe Wedstrijd</h2>
                    <form id="matchForm" class="space-y-4">
                        
                        <div>
                            <label class="block text-sm font-semibold mb-1.5">Locatie</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                                <label class="cursor-pointer text-center py-1.5 text-sm font-medium rounded-lg block has-[:checked]:bg-white has-[:checked]:text-emerald-700 text-slate-600">
                                    <input type="radio" name="venue" value="Thuis" checked onchange="toggleAddressField()" class="sr-only"> 🏡 Thuis
                                </label>
                                <label class="cursor-pointer text-center py-1.5 text-sm font-medium rounded-lg block has-[:checked]:bg-white has-[:checked]:text-amber-700 text-slate-600">
                                    <input type="radio" name="venue" value="Uit" onchange="toggleAddressField()" class="sr-only"> 🚌 Uit
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2">
                                <label class="block text-sm font-semibold mb-1">Tegenstander</label>
                                <input type="text" id="opponent" required placeholder="bijv. Dordrecht" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1">Veld nr.</label>
                                <input type="text" id="fieldNumber" placeholder="4A" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-700">🏠 Adres club / Locatie</label>
                            <input type="text" id="matchAddress" placeholder="Victoria (of adres tegenstander)" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold mb-1">Datum</label>
                            <input type="date" id="matchDate" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-semibold mb-1">Verzameltijd ⏱️</label>
                                <input type="time" id="meetTime" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1">Aanvang 🏑</label>
                                <input type="time" id="startTime" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-700">📅 Keeperstraining tijd stip</label>
                            <input type="text" id="keeperTraining" placeholder="vrijdag van 16:00-17:00 op veld 2" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1 text-slate-700">🎽 Kledingvoorschrift / Tenue</label>
                            <input type="text" id="matchTenue" placeholder="Wit victoria shirt, zwarte broek en gele sokken..." class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                        </div>

                        <div class="border-t border-slate-100 pt-3">
                            <label class="block text-sm font-bold text-slate-600 mb-1">Afmeldingen (Typ namen met een komma)</label>
                            <input type="text" id="matchAbsences" placeholder="bijv. Sophie, Daan" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>

                        <div class="border-t border-slate-100 pt-3 space-y-3">
                            <label class="block text-sm font-bold text-slate-600 mb-2">Taakverdeling</label>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Fruit 🍊</label>
                                <select id="dutySnack" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Spelbegeleider / Scheids 🏁</label>
                                <select id="dutyReferee" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Coaches 🚐</label>
                                <input type="text" id="dutyCoachText" placeholder="Paul, Marc" class="w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Keeper 🛡️</label>
                                <select id="dutyKeeper" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Keeper volgende keer (neemt tas mee) 🎒</label>
                                <select id="dutyNextKeeper" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                        </div>

                        <div class="space-y-2 pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-sm">
                                Toevoegen aan Schema
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="resetFormState()" class="w-full hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2 rounded-lg transition duration-200">
                                Annuleren
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="scheduleContainer" class="lg:col-span-3 space-y-8">
                
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-700">Aankomende Wedstrijden & Taken</h2>
                        <span id="matchCount" class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Wedstrijden</span>
                    </div>
                    
                    <div id="scheduleList" class="space-y-4">
                        <div id="emptyState" class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200 text-slate-400">
                            <span class="text-4xl">📅</span>
                            <p class="mt-2 text-sm">Er zijn momenteel geen aankomende wedstrijden ingepland.</p>
                        </div>
                    </div>
                </div>

                <div class="border-t border-slate-200 pt-6">
                    <details class="group bg-slate-100/60 rounded-2xl p-4 border border-slate-200/60" open>
                        <summary class="flex justify-between items-center font-bold text-slate-600 cursor-pointer select-none list-none">
                            <span class="flex items-center gap-2">📜 Gespeelde Wedstrijden (Archief) <span id="archiveCount" class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-semibold">0</span></span>
                            <span class="transition group-open:rotate-180 text-sm">👇</span>
                        </summary>
                        <div id="archiveList" class="space-y-4 mt-4">
                            </div>
                    </details>
                </div>

            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'ja';

        // App Status
        let matches = JSON.parse(localStorage.getItem('hockeySchedule')) || [];
        let roster = JSON.parse(localStorage.getItem('hockeyRoster')) || ['Nog niet toegewezen'];
        let editIndex = null; 

        // DOM Elementen
        const adminPanel = document.getElementById('adminPanel');
        const scheduleContainer = document.getElementById('scheduleContainer');
        const appSubtitle = document.getElementById('appSubtitle');
        const modeBadge = document.getElementById('modeBadge');
        
        const matchForm = document.getElementById('matchForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const addressFieldContainer = document.getElementById('addressFieldContainer');
        
        const rosterForm = document.getElementById('rosterForm');
        const rosterList = document.getElementById('rosterList');
        const scheduleList = document.getElementById('scheduleList');
        const archiveList = document.getElementById('archiveList');
        const emptyState = document.getElementById('emptyState');
        const matchCount = document.getElementById('matchCount');
        const archiveCount = document.getElementById('archiveCount');
        const dutySelects = document.querySelectorAll('.duty-select');

        // Modus check
        if (isAdmin) {
            adminPanel.classList.remove('hidden');
            scheduleContainer.classList.replace('lg:col-span-3', 'lg:col-span-2');
            appSubtitle.textContent = "Vul de gegevens in.
