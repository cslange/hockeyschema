<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Wedstrijdschema & Taken</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-emerald-700 tracking-tight">🏑 Hockey Taken Planner</h1>
                <p id="appSubtitle" class="text-slate-500 mt-1">Laden...</p>
            </div>
            <div id="modeBadge" class="text-xs font-bold px-3 py-1 rounded-full shadow-xs"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div id="adminPanel" class="space-y-6 hidden">
                
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-1 text-slate-700 flex items-center gap-2">🏃‍♂️ Team & Statistieken</h2>
                    <p class="text-xs text-slate-400 mb-3">📊 = Aantal taken | 🚫 = Aantal keer afgemeld.</p>
                    <form id="rosterForm" class="flex gap-2 mb-4">
                        <input type="text" id="playerName" placeholder="Naam speler..." required class="flex-1 px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition">Toevoegen</button>
                    </form>
                    <div id="rosterList" class="space-y-1.5 max-h-48 overflow-y-auto pr-1">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h2 id="formTitle" class="text-xl font-bold mb-4 text-slate-700">Nieuwe Wedstrijd</h2>
                    <form id="matchForm" class="space-y-4">
                        
                        <div>
                            <label class="block text-sm font-semibold mb-1.5">Locatie</label>
                            <div class="grid grid-cols-2 gap-2 bg-slate-100 p-1 rounded-xl">
                                <label class="cursor-pointer text-center py-1.5 text-sm font-medium rounded-lg block has-[:checked]:bg-white has-[:checked]:text-emerald-700 text-slate-600">
                                    <input type="radio" name="venue" value="Thuis" checked onchange="toggleAddressField()" class="sr-only"> 🏡 Thuis
                                </label>
                                <label class="cursor-pointer text-center py-1.5 text-sm font-medium rounded-lg block has-[:checked]:bg-white has-[:checked]:text-amber-700 text-slate-600">
                                    <input type="radio" name="venue" value="Uit" onchange="toggleAddressField()" class="sr-only"> 🚌 Uit
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2">
                                <label class="block text-sm font-semibold mb-1">Tegenstander</label>
                                <input type="text" id="opponent" required placeholder="Kampong HC" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1">Veld nr.</label>
                                <input type="text" id="fieldNumber" placeholder="Veld 2" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>

                        <div id="addressFieldContainer" class="hidden">
                            <label class="block text-sm font-semibold mb-1 text-amber-800">🏠 Adres tegenstander (voor Google Maps)</label>
                            <input type="text" id="matchAddress" placeholder="Laan van Maarschalkerweerd 14, Utrecht" class="w-full px-3 py-2 border border-amber-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 bg-amber-50/30">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold mb-1">Datum</label>
                            <input type="date" id="matchDate" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-semibold mb-1">Verzameltijd ⏱️</label>
                                <input type="time" id="meetTime" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1">Aanvang wedstrijd 🏑</label>
                                <input type="time" id="startTime" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                        </div>

                        <div class="border-t border-slate-100 pt-3">
                            <label class="block text-sm font-bold text-slate-600 mb-1">Afmeldingen (Typ namen met een komma)</label>
                            <input type="text" id="matchAbsences" placeholder="bijv. Sophie, Daan, Mees" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>

                        <div class="border-t border-slate-100 pt-3 space-y-3">
                            <label class="block text-sm font-bold text-slate-600 mb-2">Taakverdeling</label>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Keeper 🛡️</label>
                                <select id="dutyKeeper" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Keeper Coach 🧑‍🏫</label>
                                <select id="dutyKeeperCoach" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Fruit / Snacks 🍊</label>
                                <select id="dutySnack" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Scheidsrechter 🏁</label>
                                <select id="dutyReferee" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500">Veldcoach 🚐</label>
                                <select id="dutyCoach" class="duty-select w-full px-3 py-1.5 text-sm border border-slate-200 rounded-md bg-white"></select>
                            </div>
                        </div>

                        <div class="space-y-2 pt-2">
                            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-sm">
                                Toevoegen aan Schema
                            </button>
                            <button type="button" id="cancelEditBtn" onclick="resetFormState()" class="w-full hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2 rounded-lg transition duration-200">
                                Annuleren
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="scheduleContainer" class="lg:col-span-3 space-y-8">
                
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-700">Aankomende Wedstrijden & Taken</h2>
                        <span id="matchCount" class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Wedstrijden</span>
                    </div>
                    
                    <div id="scheduleList" class="space-y-4">
                        <div id="emptyState" class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200 text-slate-400">
                            <span class="text-4xl">📅</span>
                            <p class="mt-2 text-sm">Er zijn momenteel geen aankomende wedstrijden ingepland.</p>
                        </div>
                    </div>
                </div>

                <div class="border-t border-slate-200 pt-6">
                    <details class="group bg-slate-100/60 rounded-2xl p-4 border border-slate-200/60" open>
                        <summary class="flex justify-between items-center font-bold text-slate-600 cursor-pointer select-none list-none">
                            <span class="flex items-center gap-2">📜 Gespeelde Wedstrijden (Archief & Uitslagen) <span id="archiveCount" class="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-semibold">0</span></span>
                            <span class="transition group-open:rotate-180 text-sm">👇</span>
                        </summary>
                        <div id="archiveList" class="space-y-4 mt-4">
                            </div>
                    </details>
                </div>

            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin') === 'ja';

        // App Status (Veilige lokale opslag)
        let matches = JSON.parse(localStorage.getItem('hockeySchedule')) || [];
        let roster = JSON.parse(localStorage.getItem('hockeyRoster')) || ['Nog niet toegewezen'];
        let editIndex = null; 

        // DOM Elementen
        const adminPanel = document.getElementById('adminPanel');
        const scheduleContainer = document.getElementById('scheduleContainer');
        const appSubtitle = document.getElementById('appSubtitle');
        const modeBadge = document.getElementById('modeBadge');
        
        const matchForm = document.getElementById('matchForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const addressFieldContainer = document.getElementById('addressFieldContainer');
        
        const rosterForm = document.getElementById('rosterForm');
        const rosterList = document.getElementById('rosterList');
        const scheduleList = document.getElementById('scheduleList');
        const archiveList = document.getElementById('archiveList');
        const emptyState = document.getElementById('emptyState');
        const matchCount = document.getElementById('matchCount');
        const archiveCount = document.getElementById('archiveCount');
        const dutySelects = document.querySelectorAll('.duty-select');

        // --- MODUS CONFIGURATIE ---
        if (isAdmin) {
            adminPanel.classList.remove('hidden');
            scheduleContainer.classList.replace('lg:col-span-3', 'lg:col-span-2');
            appSubtitle.textContent = "Beheer de spelerslijst, uitslagen, afmeldingen en teamtaken op jouw apparaat.";
            modeBadge.textContent = "🛠️ MANAGER MODUS";
            modeBadge.className = "text-xs font-bold px-3 py-1 rounded-full shadow-xs bg-purple-100 text-purple-800";
        } else {
            appSubtitle.textContent = "Bekijk de actuele uitslagen en planning gedeeld door de manager.";
            modeBadge.textContent = "👀 OUDER OVERZICHT";
            modeBadge.className = "text-xs font-bold px-3 py-1 rounded-full shadow-xs bg-slate-100 text-slate-600";
        }

        window.toggleAddressField = function() {
            const venue = document.querySelector('input[name="venue"]:checked').value;
            if (venue === 'Uit') {
                addressFieldContainer.classList.remove('hidden');
            } else {
                addressFieldContainer.classList.add('hidden');
                document.getElementById('matchAddress').value = '';
            }
        };

        // --- STATISTIEKEN BEREKENEN ---
        function calculateStats() {
            const stats = {};
            roster.forEach(player => { 
                if(player !== 'Nog niet toegewezen') stats[player] = { duties: 0, absences: 0 }; 
            });

            matches.forEach(match => {
                ['keeper', 'keeper_coach', 'snack', 'referee', 'coach'].forEach(key => {
                    const p = match[key];
                    if (p && stats[p]) stats[p].duties++;
                });
                if (match.absences) {
                    roster.forEach(player => {
                        if (player !== 'Nog niet toegewezen' && match.absences.includes(player)) {
                            stats[player].absences++;
                        }
                    });
                }
            });
            return stats;
        }

        function renderRoster() {
            const stats = calculateStats();
            
            dutySelects.forEach(select => {
                const currentVal = select.value;
                select.innerHTML = '';
                roster.forEach(player => {
                    const opt = document.createElement('option');
                    opt.value = player === 'Nog niet toegewezen' ? '' : player;
                    opt.textContent = player;
                    select.appendChild(opt);
                });
                select.value = currentVal;
            });

            if (!isAdmin) return; 

            rosterList.innerHTML = '';
            roster.forEach((player, index) => {
                if (index === 0) return; 
                const playerStat = stats[player] || { duties: 0, absences: 0 };
                
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between bg-slate-50 border border-slate-100 p-2 rounded-xl text-sm font-medium';
                item.innerHTML = `
                    <span class="text-slate-700">${player}</span>
                    <div class="flex items-center gap-1.5">
                        <span class="bg-emerald-100 text-emerald-800 text-[11px] font-bold px-2 py-0.5 rounded-full" title="Uitgevoerde taken">📊 ${playerStat.duties}</span>
                        <span class="bg-rose-100 text-rose-800 text-[11px] font-bold px-2 py-0.5 rounded-full" title="Afmeldingen">🚫 ${playerStat.absences}x</span>
                        <button type="button" onclick="deletePlayer(${index})" class="text-slate-300 hover:text-rose-500 font-bold text-base transition ml-1">×</button>
                    </div>
                `;
                rosterList.appendChild(item);
            });
        }

        if (isAdmin) {
            rosterForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const nameInput = document.getElementById('playerName');
                const name = nameInput.value.trim();
                
                if (name && !roster.includes(name)) {
                    roster.push(name);
                    localStorage.setItem('hockeyRoster', JSON.stringify(roster));
                    renderRoster();
                    nameInput.value = '';
                }
            });

            window.deletePlayer = function(index) {
                if(confirm(`Weet je zeker dat je ${roster[index]} wilt verwijderen?`)) {
                    roster.splice(index, 1);
                    localStorage.setItem('hockeyRoster', JSON.stringify(roster));
                    renderRoster();
                }
            };
        }

        // --- WEDSTRIJD & ARCHIEF BEHEER ---
        window.saveResult = function(index, scoreValue) {
            matches[index].result = scoreValue.trim();
            localStorage.setItem('hockeySchedule', JSON.stringify(matches));
        };

        function renderSchedule() {
            scheduleList.querySelectorAll('.match-card').forEach(c => c.remove());
            archiveList.querySelectorAll('.match-card').forEach(c => c.remove());

            const today = new Date();
            today.setHours(0,0,0,0);

            matches.sort((a, b) => new Date(`${a.match_date}T${a.start_time}`) - new Date(`${b.match_date}T${b.start_time}`));

            let activeCount = 0;
            let archivedCount = 0;

            matches.forEach((match, originalIndex) => {
                const matchDateObj = new Date(match.match_date);
                matchDateObj.setHours(0,0,0,0);
                
                const isPast = matchDateObj < today;

                const card = document.createElement('div');
                card.className = `match-card p-5 rounded-2xl shadow-sm border transition hover:shadow-md flex flex-col md:flex-row gap-4 justify-between ${isPast ? 'bg-slate-50 border-slate-200/70' : 'bg-white border-slate-100'}`;
                
                const formattedDate = new Date(match.match_date).toLocaleDateString('nl-NL', { 
                    weekday: 'short', month: 'short', day: 'numeric' 
                });

                const venueBadge = match.venue === 'Thuis' 
                    ? `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200/60 text-[11px] font-bold px-2 py-0.5 rounded-md">🏡 THUIS</span>`
                    : `<span class="bg-amber-50 text-amber-700 border border-amber-200/60 text-[11px] font-bold px-2 py-0.5 rounded-md">🚌 UIT</span>`;

                const fieldBadge = match.field_number ? `<span class="bg-slate-100 text-slate-600 text-[11px] font-bold px-2 py-0.5 rounded-md">📍 Veld ${match.field_number}</span>` : '';
                
                let mapsBadge = '';
                if (match.venue === 'Uit' && match.address) {
                    const cleanAddress = encodeURIComponent(match.address);
                    mapsBadge = `<a href="http://maps.google.com/?q=` + cleanAddress + `" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white border border-blue-700 text-[11px] font-bold px-2 py-0.5 rounded-md flex items-center gap-1 shadow-xs transition">🗺️ Route</a>`;
                }

                let absenceBadge = match.absences ? `<div class="mt-2 text-xs bg-rose-50 text-rose-700 border border-rose-100/80 px-2.5 py-1 rounded-xl"><span class="font-bold">🚫 Afgemeld:</span> ` + match.absences + `</div>` : '';

                let resultBlock = '';
                if (isPast) {
                    const currentResult = match.result || '';
                    if (isAdmin) {
                        resultBlock = `
                            <div class="mt-3 pt-2 border-t border-dashed border-slate-200 flex items-center gap-2">
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">🏆 Uitslag:</label>
                                <input type="text" value="` + currentResult + `" placeholder="3 - 1" onchange="saveResult(` + originalIndex + `, this.value)" class="w-24 px-2 py-1 text-xs border border-slate-300 rounded-md bg-white text-center font-bold text-emerald-700 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                            </div>`;
                    } else if (currentResult) {
                        resultBlock = `
                            <div class="mt-3 pt-2 border-t border-dashed border-slate-200">
                                <span class="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-800 text-xs font-bold px-2.5 py-1 rounded-lg border border-emerald-100">🏆 Uitslag: ` + currentResult + `</span>
                            </div>`;
                    }
                }

                let actieKnoppen = isAdmin 
                    ? `<button onclick="shareMatch(` + originalIndex + `, true)" class="w-full md:w-auto text-xs bg-slate-800 hover:bg-slate-900 text-white font-medium px-3 py-1.5 rounded-lg transition">📲 WhatsApp</button><button onclick="shareMatch(` + originalIndex + `, false)" class="w-full md:w-auto text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-3 py-1.5 rounded-lg transition">📋 Kopieer</button><button
